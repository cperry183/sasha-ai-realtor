name: Deploy EKS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build & Push
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: your-ecr/repo:latest
    - name: Deploy
      uses: aws-actions/configure-aws-credentials@v4
      with: {aws-access-key-id: ${{secrets.AWS_KEY}}, ...}
    - run: aws eks update-kubeconfig --name your-cluster && kustomize build overlays/prod | kubectl apply -f -
