apiVersion: apps/v1kind: Deployment
metadata:
name: realtor-ai-agent
namespace: realtor-system
spec:
replicas: 3
selector:
matchLabels:
app: realtor-ai-agent
template:
metadata:
labels:
app: realtor-ai-agent
spec:
containers:
- name: realtor-ai-agent
image: ${DOCKER_REGISTRY}/realtor-ai-agent:latest
ports:
- containerPort: 8000
env:
- name: OPENAI_API_KEY
valueFrom:
secretKeyRef:
name: openai-secret
key: api-key
- name: REDIS_URL
value: "redis://redis-service:6379"
- name: DATABASE_URL
value: "postgresql://realtor:${DB_PASSWORD}@postgres-service:5432/realtor_ai"
resources:
requests:
memory: "512Mi"
cpu: "250m"
limits:
memory: "1Gi"
cpu: "500m"
livenessProbe:
httpGet:
path: /health
port: 8000
initialDelaySeconds: 30
periodSeconds: 10
readinessProbe:
httpGet:
path: /health
port: 8000
initialDelaySeconds: 5
periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
name: realtor-ai-agent-service
namespace: realtor-system
spec:
selector:
app: realtor-ai-agent
ports:
- port: 80
targetPort: 8000
type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
name: realtor-ai-agent-ingress
namespace: realtor-system
annotations:
kubernetes.io/ingress.class: nginx
cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
tls:
- hosts:
- realtor-ai.yourdomain.com
secretName: realtor-tls
rules:
- host: realtor-ai.yourdomain.com
http:
paths:
- path: /
pathType: Prefix
backend:
service:
name: realtor-ai-agent-service
port:
number: 80
