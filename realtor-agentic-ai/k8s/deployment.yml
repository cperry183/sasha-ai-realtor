apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtor-agentic-ai
  labels:
    app: realtor-agentic-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtor-agentic-ai
  template:
    metadata:
      labels:
        app: realtor-agentic-ai
    spec:
      containers:
        - name: app
          image: realtor-agentic-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20

